<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Access denied - dLU</title>
    <style>
      :root {
        color: #1f2529;
        background: #f8f7f3;
        font-family:
          Manrope, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      body {
        display: grid;
        min-height: 100vh;
        place-items: center;
        margin: 0;
        padding: 24px;
        background: linear-gradient(180deg, #ffffff, transparent 46%), #f8f7f3;
      }

      main {
        display: grid;
        gap: 16px;
        width: min(100%, 430px);
        padding: 28px;
        border: 1px solid rgba(246, 91, 102, 0.28);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.86);
        box-shadow: 0 18px 46px rgba(22, 74, 92, 0.11);
      }

      h1,
      p {
        margin: 0;
      }

      h1 {
        font-size: 1.25rem;
        line-height: 1.2;
      }

      p {
        color: #60747c;
        font-size: 0.9rem;
        line-height: 1.45;
      }

      a {
        color: #237b94;
        font-weight: 760;
      }

      .attempt {
        padding: 10px 12px;
        border: 1px solid rgba(246, 91, 102, 0.28);
        border-radius: 8px;
        color: #73333a;
        background: color-mix(in srgb, #f65b66 10%, #ffffff);
        font-size: 0.85rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Access denied</h1>
      <p>This workspace is restricted to approved DeepLearning.AI email domains.</p>
      <div class="attempt">Attempted email: {{ attempted_email }}</div>
      <p><a href="{% url 'account_login' %}">Try another Google account</a></p>
    </main>
  </body>
</html>
