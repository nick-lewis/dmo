services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dmo}
      POSTGRES_USER: ${POSTGRES_USER:-dmo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dmo}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dmo} -d ${POSTGRES_DB:-dmo}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    environment:
      DEBUG: ${DEBUG:-True}
      SECRET_KEY: ${SECRET_KEY:-django-insecure-local-dev-change-me}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0,backend}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      TIME_ZONE: ${TIME_ZONE:-America/New_York}
      DATABASE_URL: postgres://${POSTGRES_USER:-dmo}:${POSTGRES_PASSWORD:-dmo}@db:5432/${POSTGRES_DB:-dmo}
      ALLOWED_LOGIN_EMAIL_DOMAINS: ${ALLOWED_LOGIN_EMAIL_DOMAINS:-deeplearning.ai}
      DLU_DEV_AUTH_BYPASS: ${DLU_DEV_AUTH_BYPASS:-True}
      DLU_DEV_LOGIN_EMAIL: ${DLU_DEV_LOGIN_EMAIL:-nicky@deeplearning.ai}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DLU_REALTIME_DEFAULT_MODEL: ${DLU_REALTIME_DEFAULT_MODEL:-gpt-realtime-mini}
      DLU_REALTIME_DEFAULT_VOICE: ${DLU_REALTIME_DEFAULT_VOICE:-ash}
      DLU_REALTIME_INSTRUCTIONS: ${DLU_REALTIME_INSTRUCTIONS:-}
      DLU_VOICE_SAMPLE_SCRIPT_MODEL: ${DLU_VOICE_SAMPLE_SCRIPT_MODEL:-gpt-4o-mini}
      DLU_VOICE_SAMPLE_TTS_MODEL: ${DLU_VOICE_SAMPLE_TTS_MODEL:-gpt-4o-mini-tts}
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: node:22-alpine
    working_dir: /app/frontend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_PROXY_TARGET: http://backend:8000
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - frontend_node_modules:/app/frontend/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
  frontend_node_modules:
